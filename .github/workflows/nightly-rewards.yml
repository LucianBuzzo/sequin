name: nightly-rewards

on:
  schedule:
    - cron: '10 0 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Epoch date (YYYY-MM-DD). Defaults to yesterday UTC.'
        required: false

jobs:
  reward-mint:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Generate reward manifest from merged PR activity
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_DATE: ${{ github.event.inputs.date }}
        run: |
          if [ -n "${INPUT_DATE}" ]; then
            node scripts/score_epoch.js --date "${INPUT_DATE}"
          else
            node scripts/score_epoch.js
          fi
      - name: Mint rewards into ledger
        env:
          INPUT_DATE: ${{ github.event.inputs.date }}
        run: |
          if [ -n "${INPUT_DATE}" ]; then
            node scripts/mint_rewards.js --date "${INPUT_DATE}"
          else
            node scripts/mint_rewards.js
          fi
      - name: Verify chain + tx state
        run: |
          node scripts/verify_chain.js
          node scripts/verify_tx.js
      - name: Commit nightly reward/mint updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rewards ledger/state ledger/blocks
          if git diff --cached --quiet; then
            echo "No reward mint changes to commit"
            exit 0
          fi
          git commit -m "chore(rewards): generate and mint nightly epoch"
          git push
