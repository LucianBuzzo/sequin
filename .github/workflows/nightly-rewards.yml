name: nightly-rewards

on:
  schedule:
    - cron: '10 0 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Epoch date (YYYY-MM-DD). Defaults to yesterday UTC.'
        required: false

jobs:
  reward-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Generate reward manifest from merged PR activity
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_DATE: ${{ github.event.inputs.date }}
        run: |
          if [ -n "${INPUT_DATE}" ]; then
            node scripts/score_epoch.js --date "${INPUT_DATE}"
          else
            node scripts/score_epoch.js
          fi
      - name: Open reward PR
        uses: peter-evans/create-pull-request@v7
        with:
          branch: bot/nightly-rewards
          title: "chore(rewards): nightly PoPR reward manifest"
          body: |
            Automated nightly reward manifest generated from merged PR activity.

            This includes:
            - scorer config snapshot
            - per-user reward allocations
            - per-PR scoring details for auditability
          commit-message: "chore(rewards): generate nightly PoPR reward manifest"
