name: rebuild-ledger

on:
  push:
    branches: [master]

jobs:
  apply-block:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Verify pending tx
        run: node scripts/verify_tx.js
      - name: Apply new block from pending tx
        run: node scripts/apply_block.js
      - name: Commit ledger updates (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ledger tx/pending
          if git diff --cached --quiet; then
            echo "No ledger changes to commit"
            exit 0
          fi
          git commit -m "chore(ledger): apply pending tx block"
          git push
