name: rebuild-ledger

on:
  push:
    branches: [master]

jobs:
  apply-block:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install system deps for Crystal linking
        run: |
          sudo apt-get update
          sudo apt-get install -y libyaml-dev libevent-dev libpcre3-dev
      - uses: MeilCli/setup-crystal-action@v4
        with:
          crystal_version: 1.13.2
      - name: Cache Crystal shards
        uses: actions/cache@v4
        with:
          path: |
            lib
            ~/.cache/shards
          key: shards-${{ runner.os }}-${{ hashFiles('shard.lock', 'shard.yml') }}
          restore-keys: |
            shards-${{ runner.os }}-
      - name: Install Crystal dependencies
        run: shards install
      - name: Verify chain structure
        run: crystal run src/sequin_tool.cr -- verify:chain
      - name: Verify pending tx
        run: crystal run src/sequin_tool.cr -- verify:tx
      - name: Apply new block from pending tx
        run: crystal run src/sequin_tool.cr -- ledger:apply-block
      - name: Commit ledger updates (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A ledger tx rewards || true
          if git diff --cached --quiet; then
            echo "No ledger changes to commit"
            exit 0
          fi
          git commit -m "chore(ledger): apply pending tx block"
          git push
