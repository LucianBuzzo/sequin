name: Lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint repo files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system deps for Crystal linking
        run: |
          sudo apt-get update
          sudo apt-get install -y libyaml-dev libevent-dev libpcre3-dev

      - uses: MeilCli/setup-crystal-action@v4
        with:
          crystal_version: 1.13.2

      - name: Cache Crystal shards
        uses: actions/cache@v4
        with:
          path: |
            lib
            ~/.cache/shards
          key: shards-${{ runner.os }}-${{ hashFiles('shard.lock', 'shard.yml') }}
          restore-keys: |
            shards-${{ runner.os }}-

      - name: Install Crystal dependencies
        run: shards install

      - name: Validate repository state files
        run: crystal run src/sequin_tool.cr -- repo:lint
